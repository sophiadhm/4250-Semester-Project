{% extends 'base.html' %}

{% block title %}Calendar{% endblock %}

{% block content %}
<div class="heading-container">
    <h3 class="page-title">Calendar</h3>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='calendar.css') }}">

<div class="calendar-center-wrapper">
  <div class="calendar">
    <div class="cal-header">
      <button class="cal-nav" id="prevBtn">&#8249;</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav" id="nextBtn">&#8250;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="calendar-actions">
    <button type="button" class="add-assignment-btn" id="openCalendarConnectBtn">
        Connect D2L Calendar
    </button>

    <a href="/sync" class="sync-link">Sync Assignments</a>
</div>

<div id="calendarConnectOverlay" class="form-overlay hidden">
    <div class="form-container">
        <h3>Connect your D2L Calendar</h3>

        <form method="POST" action="/connect-calendar">
            <label for="ics_url">D2L Calendar Feed</label>
            <input
                type="text"
                id="ics_url"
                name="ics_url"
                placeholder="Paste your D2L calendar feed"
                required
            >

            <div class="form-buttons">
                <button type="button" id="closeCalendarConnectBtn" class="cancel-btn">Cancel</button>
                <button type="submit" class="submit-btn">Connect Calendar</button>
            </div>
        </form>
    </div>
</div>

<div id="dayAssignmentsOverlay" class="form-overlay hidden">
  <div class="form-container day-popup">
    <div class="popup-header">
      <h3 id="popupDateTitle">Assignments for Selected Day</h3>
      <button type="button" id="closeDayPopup" class="cancel-btn">Close</button>
    </div>

    <div id="popupAssignmentsContent">
      <p>No assignments for this date.</p>
    </div>
  </div>
</div>

<script type="application/json" id="calendar-assignments-data">{{ assignments | tojson }}</script>
<script>
(function() {
  var assignments = JSON.parse(document.getElementById('calendar-assignments-data').textContent);
  var eventsByDate = {};

  assignments.forEach(function(a) {
    if (!a.due_date) return;
    if (!eventsByDate[a.due_date]) eventsByDate[a.due_date] = [];
    eventsByDate[a.due_date].push(a);
  });

  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var months = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];

  var currentDate = new Date();
  var selectedDate = null;
  var today = new Date();

  var dayOverlay = document.getElementById('dayAssignmentsOverlay');
  var closeDayPopup = document.getElementById('closeDayPopup');
  var popupDateTitle = document.getElementById('popupDateTitle');
  var popupAssignmentsContent = document.getElementById('popupAssignmentsContent');

  function formatDayKey(year, month, day) {
    var y = year.toString();
    var m = (month + 1).toString().padStart(2, '0');
    var d = day.toString().padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function renderAssignmentList(dateKey) {
    popupAssignmentsContent.innerHTML = '';

    var items = eventsByDate[dateKey] || [];
    popupDateTitle.textContent = 'Assignments for ' + dateKey;

    if (items.length === 0) {
      popupAssignmentsContent.innerHTML = '<p>No assignments for this date.</p>';
      dayOverlay.classList.remove('hidden');
      return;
    }

    items.sort(function(a, b) {
      return (a.due_time || '') > (b.due_time || '') ? 1 : -1;
    });

    items.forEach(function(item) {
      var card = document.createElement('div');
      card.className = 'popup-assignment-card';

      var courseText = item.course && item.course !== item.name
        ? item.course
        : 'No class tag';

      card.innerHTML =
        '<div class="popup-assignment-title">' + (item.name || 'Untitled') + '</div>' +
        '<div class="popup-assignment-meta"><strong>Class:</strong> ' + courseText + '</div>' +
        '<div class="popup-assignment-meta"><strong>Due:</strong> ' + (item.due_date || 'N/A') + ' ' + (item.due_time || 'N/A') + '</div>' +
        '<div class="popup-assignment-meta"><strong>Type:</strong> ' + (item.assignment_type || 'N/A') + '</div>' +
        '<div class="popup-assignment-meta"><strong>Priority:</strong> ' + (item.priority_level || 'N/A') + '</div>' +
        '<div class="popup-assignment-meta"><strong>Points:</strong> ' + (item.points || 'N/A') + '</div>';

      popupAssignmentsContent.appendChild(card);
    });

    dayOverlay.classList.remove('hidden');
  }
  if (openCalendarConnectBtn) {
    openCalendarConnectBtn.addEventListener('click', function() {
      calendarConnectOverlay.classList.remove('hidden');
    });
  }

  if (closeCalendarConnectBtn) {
    closeCalendarConnectBtn.addEventListener('click', function() {
      calendarConnectOverlay.classList.add('hidden');
    });
  }

  if (calendarConnectOverlay) {
    calendarConnectOverlay.addEventListener('click', function(e) {
      if (e.target === calendarConnectOverlay) {
        calendarConnectOverlay.classList.add('hidden');
      }
    });
  }
  function drawCalendar() {
    var year = currentDate.getFullYear();
    var month = currentDate.getMonth();

    document.getElementById('calTitle').textContent = months[month] + ' ' + year;

    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    for (var i = 0; i < days.length; i++) {
      var label = document.createElement('div');
      label.className = 'cal-day-label';
      label.textContent = days[i];
      grid.appendChild(label);
    }

    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();

    for (var i = 0; i < firstDay; i++) {
      var empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var dayBox = document.createElement('div');
      dayBox.className = 'cal-day';
      dayBox.textContent = d;

      if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
        dayBox.classList.add('today');
      }

      var dayKey = formatDayKey(year, month, d);
      if (eventsByDate[dayKey]) {
        dayBox.classList.add('has-event');
        var dot = document.createElement('span');
        dot.className = 'event-dot';
        dot.textContent = '•';
        dayBox.appendChild(dot);
      }

      dayBox.addEventListener('click', function() {
        var previous = document.querySelector('.cal-day.selected');
        if (previous) previous.classList.remove('selected');

        this.classList.add('selected');
        selectedDate = this.textContent;

        var selectedKey = formatDayKey(year, month, parseInt(this.textContent, 10));
        renderAssignmentList(selectedKey);
      });

      grid.appendChild(dayBox);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', function() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    drawCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', function() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    drawCalendar();
  });

  closeDayPopup.addEventListener('click', function() {
    dayOverlay.classList.add('hidden');
  });

  dayOverlay.addEventListener('click', function(e) {
    if (e.target === dayOverlay) {
      dayOverlay.classList.add('hidden');
    }
  });

  drawCalendar();
})();
</script>
{% endblock %}
