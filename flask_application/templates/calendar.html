{% extends 'base.html' %}

{% block title %}Calendar{% endblock %}

{% block content %}
<div class="heading-container">
    <h3 class="page-title">Calendar</h3>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='calendar.css') }}">

<div class="calendar-center-wrapper">
  <div class="calendar">
    <div class="cal-header" style="margin-bottom: 2.5rem;">
      <button class="cal-nav" id="prevBtn">&#8249;</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav" id="nextBtn">&#8250;</button>
    </div>
    <div style="height: 24px;"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="calendar-actions">
  <button type="button" class="add-assignment-btn" id="openCalendarConnectBtn">
    Connect D2L Calendar
  </button>

  <a href="/sync" class="sync-link">Sync Assignments</a>

  <label style="margin-left: 20px; font-size: 15px;">
    <input type="checkbox" id="hideAvailableToggle" style="vertical-align: middle; margin-right: 4px;">
    Hide 'Available' Assignments
  </label>
</div>

<div id="calendarConnectOverlay" class="form-overlay hidden">
    <div class="form-container calendar-connect-card">
        <h3>Connect your D2L Calendar</h3>

        <form method="POST" action="/connect-calendar">
            <label for="ics_url">D2L Calendar URL</label>
            <input
                type="text"
                id="ics_url"
                name="ics_url"
                placeholder="Paste your D2L calendar URL here"
                required
            >

            <div class="form-buttons">
                <button type="button" id="closeCalendarConnectBtn" class="cancel-btn">Cancel</button>
                <button type="submit" class="submit-btn">Connect Calendar</button>
            </div>
        </form>
    </div>
</div>

<div id="dayAssignmentsOverlay" class="form-overlay hidden">
  <div class="form-container day-popup" style="max-height: 80vh; overflow-y: auto;">
    <div class="popup-header">
      <h3 id="popupDateTitle">Assignments for Selected Day</h3>
      <button type="button" id="closeDayPopup" class="cancel-btn">Close</button>
    </div>

    <div id="popupAssignmentsContent" style="max-height: 60vh; overflow-y: auto;">
      <p>No assignments for this date.</p>
    </div>
  </div>
</div>

<script type="application/json" id="calendar-assignments-data">{{ assignments | tojson }}</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
(function() {

  // Move these to top-level scope so all functions can access them

  var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var months = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];

  var currentDate = new Date();
  var today = new Date();
  var selectedDate = null;

  var allAssignments = JSON.parse(document.getElementById('calendar-assignments-data').textContent);
  var assignments = [];
  var eventsByDate = {};

  // Filtering logic

  function filterAssignments() {
    var hideAvailable = document.getElementById('hideAvailableToggle').checked;
    assignments = allAssignments.filter(function(a) {
      if (!a.due_date || a.due_date.trim() === '') return false;
      if (hideAvailable && a.name && a.name.toLowerCase().includes('available')) return false;
      return true;
    });

    // Rebuild eventsByDate
    eventsByDate = {};
    assignments.forEach(function(a) {
      var normalizedDate = a.due_date.trim();
      if (!eventsByDate[normalizedDate]) eventsByDate[normalizedDate] = [];
      eventsByDate[normalizedDate].push(a);
    });
    // Always draw the calendar grid, even if there are no assignments
    drawCalendar();
  }

  // Persist toggle state in localStorage
  var hideAvailableToggle = document.getElementById('hideAvailableToggle');
  if (localStorage.getItem('hideAvailableAssignments') === 'true') {
    hideAvailableToggle.checked = true;
  }
  hideAvailableToggle.addEventListener('change', function() {
    localStorage.setItem('hideAvailableAssignments', hideAvailableToggle.checked);
    filterAssignments();
  });

  // Initial filter
  filterAssignments();





  var dayOverlay = document.getElementById('dayAssignmentsOverlay');
  var closeDayPopup = document.getElementById('closeDayPopup');
  var popupDateTitle = document.getElementById('popupDateTitle');
  var popupAssignmentsContent = document.getElementById('popupAssignmentsContent');

  function formatDayKey(year, month, day) {
    var y = year.toString();
    var m = (month + 1).toString().padStart(2, '0');
    var dayStr = day.toString().padStart(2, '0');
    return y + '-' + m + '-' + dayStr;
  }

  function formatDueTimeEst(timeValue) {
    if (!timeValue) return null;
    var raw = String(timeValue).trim();
    if (!raw) return null;

    var parts = raw.split(':');
    if (parts.length < 2) return raw;

    var hour24 = parseInt(parts[0], 10);
    var minute = parts[1].padStart(2, '0');
    if (isNaN(hour24)) return raw;

    var ampm = hour24 >= 12 ? 'PM' : 'AM';
    var hour12 = (hour24 % 12) || 12;
    return hour12 + ':' + minute + ' ' + ampm + ' EST';
  }


  function renderAssignmentList(dateKey) {
    popupAssignmentsContent.innerHTML = '';

    var items = eventsByDate[dateKey] || [];

    // Show a human-readable date in the popup
    var parts = dateKey.split('-');
    var displayDate = '';
    if (parts.length === 3) {
      displayDate = months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
    } else {
      displayDate = dateKey;
    }
    popupDateTitle.textContent = 'Assignments for ' + displayDate;

    // Debug: show all keys and the selected key
    console.log('Looking for assignments on:', dateKey, 'Found:', items.length, 'items');
    console.log('All assignment date keys:', Object.keys(eventsByDate));

    if (items.length === 0) {
      popupAssignmentsContent.innerHTML = '<p>No assignments for this date.</p>';
      dayOverlay.classList.remove('hidden');
      return;
    }

    items.sort(function(a, b) {
      return (a.due_time || '') > (b.due_time || '') ? 1 : -1;
    });

    items.forEach(function(item) {
      var card = document.createElement('div');
      card.className = 'popup-assignment-card';

      var courseDisplay = item.course && item.course !== item.name
        ? item.course + ' (' + item.course_id + ')'
        : item.course_id;

      var dotColor = item.color || '#517664';

      var typeTag = item.assignment_type
        ? '<span style="background: #dbeafe; color: #1e40af; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: 500;">' + item.assignment_type + '</span>'
        : '(Not specified)';

      var dueTimeDisplay = formatDueTimeEst(item.due_time);
      var dueDatetime = (item.due_date || 'N/A') + (dueTimeDisplay ? ' @ ' + dueTimeDisplay : '');

      var priorityDisplay = '';
      if (item.priority_level) {
        var priorityMap = {
          1: {text: 'Low', color: '#22c55e'},
          2: {text: 'Medium', color: '#eab308'},
          3: {text: 'High', color: '#ef4444'}
        };
        var priorityInfo = priorityMap[item.priority_level] || {text: 'Unknown', color: '#6b7280'};
        priorityDisplay = '<div style="font-size: 12px; color: #666; margin-top: 4px;"><strong>Priority:</strong> <span style="background: ' + priorityInfo.color + '; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 500;">' + priorityInfo.text + '</span></div>';
      }

      var pointsDisplay = item.points 
        ? '<div style="font-size: 12px; color: #666; margin-top: 2px;"><strong>Points:</strong> ' + item.points + '</div>'
        : '';

      var icsDisplay = item.ics_uid
        ? '<div style="font-size: 11px; color: #9ca3af; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e5e7eb;">📅 ID: ' + item.ics_uid.substring(0, 20) + '...</div>'
        : '';

      card.innerHTML =
        '<div style="font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #1f2937; overflow-wrap: break-word; word-break: break-word;">' + (item.name || 'Untitled') + '</div>' +
        '<div style="font-size: 12px; color: #1f2937; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;"><span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: ' + dotColor + '; flex-shrink: 0;"></span><strong>Course:</strong> ' + courseDisplay + '</div>' +
        '<div style="font-size: 12px; color: #1f2937; margin-bottom: 4px;"><strong>Type:</strong> ' + typeTag + '</div>' +
        '<div style="font-size: 12px; color: #1f2937; margin-bottom: 4px;"><strong>Due:</strong> ' + dueDatetime + '</div>' +
        pointsDisplay +
        priorityDisplay +
        icsDisplay;

      popupAssignmentsContent.appendChild(card);
    });

    dayOverlay.classList.remove('hidden');
  }
  if (openCalendarConnectBtn) {
    openCalendarConnectBtn.addEventListener('click', function() {
      calendarConnectOverlay.classList.remove('hidden');
    });
  }

  if (closeCalendarConnectBtn) {
    closeCalendarConnectBtn.addEventListener('click', function() {
      calendarConnectOverlay.classList.add('hidden');
    });
  }

  if (calendarConnectOverlay) {
    calendarConnectOverlay.addEventListener('click', function(e) {
      if (e.target === calendarConnectOverlay) {
        calendarConnectOverlay.classList.add('hidden');
      }
    });
  }
  function drawCalendar() {
    var year = currentDate.getFullYear();
    var month = currentDate.getMonth();

    document.getElementById('calTitle').textContent = months[month] + ' ' + year;

    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    for (var i = 0; i < days.length; i++) {
      var label = document.createElement('div');
      label.className = 'cal-day-label';
      label.textContent = days[i];
      grid.appendChild(label);
    }

    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();

    for (var i = 0; i < firstDay; i++) {
      var empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var dayBox = document.createElement('div');
      dayBox.className = 'cal-day';
      dayBox.textContent = d;

      if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
        dayBox.classList.add('today');
      }

      var dayKey = formatDayKey(year, month, d);
      if (eventsByDate[dayKey]) {
        dayBox.classList.add('has-event');
        // Add a colored dot for each unique course on this day
        var courseColors = {};
        var totalAssignments = eventsByDate[dayKey].length;
        eventsByDate[dayKey].forEach(function(evt) {
          var course = evt.course || 'uncategorized';
          if (!courseColors[course]) {
            courseColors[course] = evt.color || '#517664';
          }
        });

        // Add assignment count indicator if more than 3 assignments
        if (totalAssignments > 3) {
          var countIndicator = document.createElement('span');
          countIndicator.className = 'assignment-count';
          countIndicator.textContent = totalAssignments;
          countIndicator.title = totalAssignments + ' assignments';
          dayBox.appendChild(countIndicator);
        }

        // Create a flex container for dots
        var dotContainer = document.createElement('div');
        dotContainer.className = 'event-dots';

        Object.values(courseColors).forEach(function(color) {
          var dot = document.createElement('span');
          dot.className = 'event-dot';
          dot.style.backgroundColor = color;
          dotContainer.appendChild(dot);
        });
        dayBox.appendChild(dotContainer);
      }


      // Use an IIFE to capture the current value of d for each day
      (function(dayNum) {
        dayBox.addEventListener('click', function() {
          var previous = document.querySelector('.cal-day.selected');
          if (previous) previous.classList.remove('selected');

          this.classList.add('selected');
          selectedDate = dayNum;

          // Always use the current visible year and month
          var visibleYear = currentDate.getFullYear();
          var visibleMonth = currentDate.getMonth();
          var selectedKey = formatDayKey(visibleYear, visibleMonth, dayNum);
          console.log('Clicked day:', dayNum, 'Generated key:', selectedKey);
          renderAssignmentList(selectedKey);
        });
      })(d);

      grid.appendChild(dayBox);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', function() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    drawCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', function() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    drawCalendar();
  });

  closeDayPopup.addEventListener('click', function() {
    dayOverlay.classList.add('hidden');
  });

  dayOverlay.addEventListener('click', function(e) {
    if (e.target === dayOverlay) {
      dayOverlay.classList.add('hidden');
    }
  });

  drawCalendar();
})();
});
</script>
{% endblock %}
