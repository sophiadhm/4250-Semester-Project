<!DOCTYPE html>
<html lang="en">


<head>
    <title>{% block title %}Calendrier{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-container">
        
        <div class="navbar-left">
            <img src="{{ url_for('static', filename='images/light-logo.png') }}" alt="Home icon" class="icon-img">
            <a href="/" class="navbar-brand">Calendrier - Assignment Tracker</a>
        </div>

        <ul class="navbar-menu">
            <li><a href="/">Home</a></li>
            <li><a href="/calendar">Calendar</a></li>
            <li><a href="/assignments">Assignments</a></li>
            <li><a href="/account">Account</a></li>
        </ul>
    </div>
</nav>
    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
    <div class="footer-container">

        <div class="footer-left">
            <strong>Calendrier</strong> © 2026
        </div>

        <div class="footer-center">
            <a href="/">Home</a>
            <a href="/calendar">Calendar</a>
            <a href="/assignments">Assignments</a>
            <a href="/account">Account</a>
        </div>

        <div class="footer-right">
            Built with love for productivity
        </div>

    </div>
</footer>
</body>
<script>
    // Always apply saved theme on every page load
    document.addEventListener('DOMContentLoaded', function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
        } else {
            document.body.classList.remove('dark-theme');
        }
    });
</script>
</body>
</body>
