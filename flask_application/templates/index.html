{% extends "base.html" %}
{% block content %}

<div class="heading-container">
    <h3 class="page-title">Home</h3>
</div>

<div class="assignments-section">
    <div class="assignments-header">
        <h2>Add New Assignment</h2>
        <button type="button" class="add-assignment-btn" id="openFormBtn">+</button>
    </div>

    <ul class="assignments-list">
        {% for assignment in assignments %}
        <li class="assignment-item">
            <span class="assignment-title">{{ assignment.title }}</span>
            <span class="assignment-due">Due: {{ assignment.due_date }}</span> 
        </li>
        {% else %}
        <li>No assignments found.</li>
        {% endfor %}
    </ul>
</div>

<div id="formOverlay" class="form-overlay hidden">
        <div class="form-container">
            <h3>Add New Assignment</h3>
        
        <form method="POST" action="/assignments/new">
                <label for="name">Assignment Name:</label>
                <input type="text" name="name" placeholder="Assignment Name" required>
            
                <label for="class">Class</label>
                <input type="text" id="class" name="class" required>

                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date" required>

                <label for="priority">Priority</label>
                <select id="priority" name="priority" required>
                    <option value="">Select Priority</option>
                    <option value="1">1 (High)</option>
                    <option value="2">2 (Medium)</option>
                    <option value="3">3 (Low)</option>
                </select>
                <div class="form-buttons">
                    <button type="button" id="closeFormBtn" class="cancel-btn">Cancel</button>
                    <button type="submit" id="submitFormBtn" class="submit-btn">Submit</button>
                </div>
        </form>
</div>

<script>
    const openFormBtn = document.getElementById("openFormBtn");
    const closeFormBtn = document.getElementById("closeFormBtn");
    const formOverlay = document.getElementById("formOverlay");

    if (openFormBtn && formOverlay) {
        openFormBtn.addEventListener("click", () => {
            formOverlay.classList.remove("hidden");
        });
    }

    if (closeFormBtn && formOverlay) {
        closeFormBtn.addEventListener("click", () => {
            formOverlay.classList.add("hidden");
        });
    }

    if (formOverlay) {
        formOverlay.addEventListener("click", (e) => {
            if (e.target === formOverlay) {
                formOverlay.classList.add("hidden");
            }
        });
    }
</script>

{% endblock %}
