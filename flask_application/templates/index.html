{% extends "base.html" %}
{% block content %}

<div class="dashboard">

  <!-- LEFT COLUMN: mini calendar + pomodoro -->
  <aside class="dash-sidebar">

    <div class="widget-card" id="miniCalWidget">
      <div class="widget-label">Calendar</div>
      <div class="mini-cal">
        <div class="mini-cal-header">
          <button class="mini-nav" id="miniPrev">&#8249;</button>
          <span class="mini-cal-title" id="miniCalTitle"></span>
          <button class="mini-nav" id="miniNext">&#8250;</button>
        </div>
        <div class="mini-cal-grid" id="miniCalGrid"></div>
      </div>
      <a href="/calendar" class="widget-link">Open full calendar →</a>
    </div>

    <div style="display: flex; align-items: center; gap: 18px; margin-bottom: 10px;">
      <div class="assign-section-label">Upcoming assignments</div>
    </div>

    <div class="widget-card" id="pomodoroWidget">
      <div class="widget-label">Focus Timer</div>
      <div class="pomodoro">
        <div class="pomo-display" id="pomoDisplay">25:00</div>
        <div class="pomo-mode-tabs">
          <button class="pomo-tab active" onclick="setMode(this,25,'Focus')">Focus</button>
          <button class="pomo-tab" onclick="setMode(this,5,'Short Break')">Short</button>
          <button class="pomo-tab" onclick="setMode(this,15,'Long Break')">Long</button>
          <button class="pomo-tab" onclick="setCustomMode(this)">Custom</button>
        </div>
        <div class="pomo-controls">
          <button class="pomo-btn" id="pomoStartStop" onclick="togglePomo()">Start</button>
          <button class="pomo-btn pomo-reset" onclick="resetPomo()">Reset</button>
        </div>
        <div class="pomo-sessions">
          <span class="pomo-dot active"></span>
          <span class="pomo-dot"></span>
          <span class="pomo-dot"></span>
          <span class="pomo-dot"></span>
        </div>
      </div>
    </div>

  </aside>

  <!-- RIGHT COLUMN: assignment list -->
  <main class="dash-main">

    <div class="dash-main-header">
      <h1 class="dash-title">Add new assignment</h1>
      <button type="button" class="add-btn" id="openFormBtn">+</button>
    </div>

    <div style="display: flex; align-items: center; gap: 18px; margin-bottom: 10px;">
      <div class="assign-section-label">Upcoming assignments</div>
      <label style="font-size: 14px;">
        <input type="checkbox" id="hideAvailableToggle" style="vertical-align: middle; margin-right: 4px;">
        Hide 'Available' Assignments
      </label>
    </div>

    <ul class="assign-list" id="assignList">
      <!-- Assignment items will be rendered by JS -->
    </ul>

    <script type="text/javascript">
      window.allAssignments = {{ assignments|tojson|safe }};
    </script>

    <script>
    window.openEditModal = function(id) {
      const a = window.allAssignments.find(x => x.id === id);
      if (!a) {
        console.error('Assignment not found:', id, window.allAssignments);
        return;
      }
      document.getElementById('editForm').action = `/assignments/${id}/edit`;
      document.getElementById('editAssignmentId').value = a.id;
      document.getElementById('editName').value = a.name || '';
      document.getElementById('editCourse').value = a.course || '';
      document.getElementById('editDueDate').value = a.due_date || '';
      document.getElementById('editPriority').value = a.priority_level || '';
      document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEditModal = function() {
      document.getElementById('editModal').style.display = 'none';
    };
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
      const assignList = document.getElementById('assignList');
      const hideAvailableToggle = document.getElementById('hideAvailableToggle');

      function renderAssignments() {
        assignList.innerHTML = '';
        let filtered = window.allAssignments.filter(a => a.due_date && a.due_date.trim() !== '');

        if (hideAvailableToggle.checked) {
          filtered = filtered.filter(a => !(a.name && a.name.toLowerCase().includes('available')));
        }

        if (filtered.length === 0) {
          const li = document.createElement('li');
          li.className = 'assign-empty';
          li.textContent = 'No assignments yet — add one to get started.';
          assignList.appendChild(li);
          return;
        }

        filtered.forEach(assignment => {
          const p = assignment.priority_level ? parseInt(assignment.priority_level) : 0;
          const tag_color = assignment.color || '#517664';
          const li = document.createElement('li');
          li.className = 'assign-row';

          li.innerHTML = `
            <div class="assign-row-left">
              <span class="assign-priority-dot pri-${p}"></span>
              <div style="display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 0;">
                <div style="min-width: 0; flex: 1;">
                  <div style="font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${assignment.name}</div>
                  <div style="font-size: 12px; color: #666; margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap;">
                    ${assignment.assignment_type ? `<span style="background: #e3f2fd; color: #1565c0; padding: 2px 6px; border-radius: 3px; font-size: 11px; white-space: nowrap;">${assignment.assignment_type}</span>` : ''}
                    ${assignment.priority_level ? (() => {
                      const priorityMap = {
                        1: {text: 'Low', color: '#22c55e'},
                        2: {text: 'Medium', color: '#eab308'},
                        3: {text: 'High', color: '#ef4444'}
                      };
                      const info = priorityMap[p] || {text: 'Unknown', color: '#6b7280'};
                      return `<span style="background: ${info.color}; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; white-space: nowrap; font-weight: 500;">${info.text}</span>`;
                    })() : ''}
                  </div>
                </div>
                ${(assignment.course && assignment.course !== assignment.name) ? `<span class="assign-tag" data-color="${tag_color}" style="white-space: nowrap; flex-shrink: 0; border-color: ${tag_color}; color: ${tag_color}; background-color: ${tag_color}18;">${assignment.course}</span>` : ''}
              </div>
            </div>
            <div class="assign-row-right">
              <span class="assign-due">${assignment.due_date}</span>
              <div class="assign-options-wrap" style="position:relative;">
                <button class="assign-action-btn" title="Options" onclick="toggleMenu(event, ${assignment.id})">···</button>
                <div class="assign-dropdown" id="menu-${assignment.id}" style="display:none; position:absolute; right:0; top:100%; background:white; border:1px solid #ddd; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.12); z-index:100; min-width:130px;">
                  <button onclick="openEditModal(${assignment.id})" style="display:block; width:100%; padding:8px 16px; text-align:left; border:none; background:none; cursor:pointer;">✏️ Edit</button>
                  <form method="POST" action="/assignments/${assignment.id}/delete" onsubmit="return confirm('Delete this assignment?')">
                    <button type="submit" style="display:block; width:100%; padding:8px 16px; text-align:left; border:none; background:none; cursor:pointer; color:#e53e3e;">🗑️ Delete</button>
                  </form>
                </div>
              </div>
            </div>
          `;
          assignList.appendChild(li);
        });

        document.querySelectorAll(".assign-tag").forEach(tag => {
          const c = tag.dataset.color || "#517664";
          tag.style.borderColor = c;
          tag.style.color = c;
          tag.style.backgroundColor = c + "18";
        });
      }

      if (localStorage.getItem('hideAvailableAssignments') === 'true') {
        hideAvailableToggle.checked = true;
      }

      hideAvailableToggle.addEventListener('change', function() {
        localStorage.setItem('hideAvailableAssignments', hideAvailableToggle.checked);
        renderAssignments();
      });

      renderAssignments();
    });

    window.toggleMenu = function(e, id) {
      e.stopPropagation();
      document.querySelectorAll('.assign-dropdown').forEach(d => {
        if (d.id !== 'menu-' + id) d.style.display = 'none';
      });
      const menu = document.getElementById('menu-' + id);
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    };

    document.addEventListener('click', () => {
      document.querySelectorAll('.assign-dropdown').forEach(d => d.style.display = 'none');
    });

    window.openEditModal = function(id) {
      const a = window.allAssignments.find(x => x.id === id);
      if (!a) return;
      document.getElementById('editAssignmentId').value = a.id;
      document.getElementById('editName').value = a.name || '';
      document.getElementById('editCourse').value = a.course || '';
      document.getElementById('editDueDate').value = a.due_date || '';
      document.getElementById('editPriority').value = a.priority_level || '';
      document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEditModal = function() {
      document.getElementById('editModal').style.display = 'none';
    };
    </script>

  </main>
</div>

<!-- ADD ASSIGNMENT MODAL -->
<div id="formOverlay" class="form-overlay hidden">
  <div class="modal">

    <div class="modal-header">
      <h3 class="modal-title">Add New Assignment</h3>
      <button type="button" class="modal-close" id="closeFormBtn">✕</button>
    </div>

    <form method="POST" action="/assignments/new" id="assignForm">

      <div class="field-group">
        <label class="field-label" for="name">Assignment Name</label>
        <input class="field-input" type="text" id="name" name="name" placeholder="e.g. Lab Report #4" required>
      </div>

      <div class="field-row">
        <div class="field-group" style="flex:1">
          <label class="field-label" for="course">Class</label>
          <input class="field-input" type="text" id="course" name="course" placeholder="e.g. CSCI 4250">
        </div>
        <div class="field-group color-group">
          <label class="field-label" for="class_color">Color</label>
          <div class="color-picker-wrap">
            <input type="color" id="class_color" name="class_color" value="#517664">
            <span class="tag-preview" id="tagPreview">CSCI 4250</span>
          </div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="due_date">Due Date</label>
        <input class="field-input" type="date" id="due_date" name="due_date" required>
      </div>

      <div class="field-group">
        <label class="field-label">Priority</label>
        <div class="priority-picker">
          <input type="hidden" id="priority" name="priority" value="">
          <button type="button" class="pri-option" data-value="1">
            <span class="pri-dot-btn pri-1"></span>
            <span class="pri-option-label">High</span>
          </button>
          <button type="button" class="pri-option" data-value="2">
            <span class="pri-dot-btn pri-2"></span>
            <span class="pri-option-label">Medium</span>
          </button>
          <button type="button" class="pri-option" data-value="3">
            <span class="pri-dot-btn pri-3"></span>
            <span class="pri-option-label">Low</span>
          </button>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="cancelBtn" class="cancel-btn">Cancel</button>
        <button type="submit" class="submit-btn">Add Assignment</button>
      </div>

    </form>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // ── Overlay open/close ──
  const overlay = document.getElementById("formOverlay");
  const openBtn = document.getElementById("openFormBtn");
  const closeBtn = document.getElementById("closeFormBtn");
  const cancelBtn = document.getElementById("cancelBtn");

  openBtn.addEventListener("click", () => overlay.classList.remove("hidden"));
  closeBtn.addEventListener("click", () => overlay.classList.add("hidden"));
  cancelBtn.addEventListener("click", () => overlay.classList.add("hidden"));
  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.add("hidden");
  });

  // ── Tag preview ──
  const colorInput = document.getElementById("class_color");
  const courseInput = document.getElementById("course");
  const tagPreview = document.getElementById("tagPreview");

  function updateTagPreview() {
    const color = colorInput.value;
    const name = courseInput.value.trim() || "Course Tag";
    tagPreview.textContent = name;
    tagPreview.style.borderColor = color;
    tagPreview.style.color = color;
    tagPreview.style.backgroundColor = color + "18";
  }

  colorInput.addEventListener("input", updateTagPreview);
  courseInput.addEventListener("input", updateTagPreview);
  updateTagPreview();

  // ── Priority picker ──
  const priInput = document.getElementById("priority");
  const priOptions = document.querySelectorAll(".pri-option");

  priOptions.forEach(btn => {
    btn.addEventListener("click", () => {
      priOptions.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      priInput.value = btn.dataset.value;
    });
  });

  // ── Mini Calendar ──
  const months = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const days = ["Su","Mo","Tu","We","Th","Fr","Sa"];

  let cur = new Date();
  cur = new Date(cur.getFullYear(), cur.getMonth(), 1);

  const tod = new Date();
  const miniAssignments = window.allAssignments || [];

  const miniEventsByDate = {};
  miniAssignments.forEach(a => {
    if (!a.due_date) return;
    const date = a.due_date.trim();
    if (!miniEventsByDate[date]) {
      miniEventsByDate[date] = [];
    }
    miniEventsByDate[date].push(a);
  });

  function drawMini() {
    const y = cur.getFullYear();
    const m = cur.getMonth();

    document.getElementById("miniCalTitle").textContent = months[m].slice(0, 3) + " " + y;

    const grid = document.getElementById("miniCalGrid");
    grid.innerHTML = "";

    days.forEach(d => {
      const lbl = document.createElement("div");
      lbl.className = "mc-lbl";
      lbl.textContent = d;
      grid.appendChild(lbl);
    });

    const fd = new Date(y, m, 1).getDay();
    const dim = new Date(y, m + 1, 0).getDate();

    for (let i = 0; i < fd; i++) {
      const e = document.createElement("div");
      e.className = "mc-day empty";
      grid.appendChild(e);
    }

    for (let d = 1; d <= dim; d++) {
      const cell = document.createElement("div");
      cell.className = "mc-day";
      cell.textContent = d;

      if (
        d === tod.getDate() &&
        m === tod.getMonth() &&
        y === tod.getFullYear()
      ) {
        cell.classList.add("mc-today");
      }

      const key = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

      if (miniEventsByDate[key]) {
        cell.style.position = "relative";

        const courseColors = {};
        miniEventsByDate[key].forEach(evt => {
          const course = evt.course || "uncategorized";
          if (!courseColors[course]) {
            courseColors[course] = evt.color || "#517664";
          }
        });

        const dots = Object.values(courseColors).slice(0, 3);

        const dotWrap = document.createElement("div");
        dotWrap.style.display = "flex";
        dotWrap.style.justifyContent = "center";
        dotWrap.style.gap = "3px";
        dotWrap.style.marginTop = "2px";

        dots.forEach(color => {
          const dot = document.createElement("span");
          dot.style.display = "inline-block";
          dot.style.width = "6px";
          dot.style.height = "6px";
          dot.style.borderRadius = "50%";
          dot.style.background = color;
          dotWrap.appendChild(dot);
        });

        cell.appendChild(dotWrap);
      }

      grid.appendChild(cell);
    }
  }

  document.getElementById("miniPrev").addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    cur = new Date(cur.getFullYear(), cur.getMonth() - 1, 1);
    drawMini();
  });

  document.getElementById("miniNext").addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
    drawMini();
  });

  const miniWidget = document.getElementById("miniCalWidget");
  if (miniWidget) {
    miniWidget.addEventListener("click", function (e) {
      if (!e.target.closest(".mini-nav") && !e.target.closest(".widget-link")) {
        window.location.href = "/calendar";
      }
    });
  }

  drawMini();

  // ── Pomodoro ──
  window._pm = 25;
  window._ps = 1500;
  window._pr = false;
  window._pi = null;

  window.setMode = function(btn, mins, label) {
    document.querySelectorAll(".pomo-tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    window._pm = mins;
    resetPomo();
  };

  window.setCustomMode = function(btn) {
    const input = prompt("Enter custom time in minutes:");

    if (!input) return;

    const mins = parseInt(input);

    if (isNaN(mins) || mins <= 0) {
      alert("Please enter a valid number.");
      return;
    }

    document.querySelectorAll(".pomo-tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");

    window._pm = mins;
    resetPomo();
  };

  window.togglePomo = function() {
    if (window._pr) {
      clearInterval(window._pi);
      window._pr = false;
      document.getElementById("pomoStartStop").textContent = "Resume";
    } else {
      window._pr = true;
      document.getElementById("pomoStartStop").textContent = "Pause";
      window._pi = setInterval(() => {
        if (window._ps <= 0) {
          clearInterval(window._pi);
          window._pr = false;
          document.getElementById("pomoStartStop").textContent = "Start";
          document.getElementById("pomoDisplay").textContent = "Done!";
          return;
        }
        window._ps--;
        const m = String(Math.floor(window._ps / 60)).padStart(2, "0");
        const s = String(window._ps % 60).padStart(2, "0");
        document.getElementById("pomoDisplay").textContent = m + ":" + s;
      }, 1000);
    }
  };

  window.resetPomo = function() {
    clearInterval(window._pi);
    window._pr = false;
    window._ps = window._pm * 60;
    const m = String(window._pm).padStart(2, "0");
    document.getElementById("pomoDisplay").textContent = m + ":00";
    document.getElementById("pomoStartStop").textContent = "Start";
  };
});
</script>

<!-- Edit Assignment Modal -->
<div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:10px; padding:28px; min-width:320px; max-width:420px; width:90%;">
    <h2 style="margin-top:0;">Edit Assignment</h2>
    <form method="POST" id="editForm">
      <input type="hidden" id="editAssignmentId">
      <label>Name<br>
        <input type="text" id="editName" name="name" style="width:100%; margin-bottom:10px; padding:6px; border:1px solid #ccc; border-radius:4px;">
      </label>
      <label>Course<br>
        <input type="text" id="editCourse" name="course" style="width:100%; margin-bottom:10px; padding:6px; border:1px solid #ccc; border-radius:4px;">
      </label>
      <label>Due Date<br>
        <input type="date" id="editDueDate" name="due_date" style="width:100%; margin-bottom:10px; padding:6px; border:1px solid #ccc; border-radius:4px;">
      </label>
      <label>Priority<br>
        <select id="editPriority" name="priority" style="width:100%; margin-bottom:16px; padding:6px; border:1px solid #ccc; border-radius:4px;">
          <option value="1">Low</option>
          <option value="2">Medium</option>
          <option value="3">High</option>
        </select>
      </label>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button type="button" onclick="closeEditModal()" style="padding:8px 18px; border:1px solid #ccc; border-radius:4px; background:white; cursor:pointer;">Cancel</button>
        <button type="submit" style="padding:8px 18px; background:#2d3a6b; color:white; border:none; border-radius:4px; cursor:pointer;">Save</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
